"""
GitHub Actions workflow for Partner App QA automation.
Runs tests on push and pull requests.
"""

name: Partner App QA Automation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: "0 2 * * *"  # Daily at 2 AM

env:
  PYTHON_VERSION: "3.13"
  ENVIRONMENT: "staging"

jobs:
  # =========================================================================
  # Lint and Code Quality
  # =========================================================================
  
  lint:
    name: Lint and Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run Black
        run: black --check .
      
      - name: Run isort
        run: isort --check-only .
      
      - name: Run Pylint
        run: pylint core/ pages/ api/ database/ --fail-under=7.0
      
      - name: Run MyPy
        run: mypy core/ pages/ api/ database/ --ignore-missing-imports

  # =========================================================================
  # Unit Tests
  # =========================================================================
  
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run unit tests
        run: |
          pytest tests/unit -v --cov=core,pages,api,database \
            --cov-report=xml --cov-report=html \
            --junitxml=test-results/junit.xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # =========================================================================
  # Smoke Tests
  # =========================================================================
  
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
      
      - name: Install Playwright browsers
        run: playwright install
      
      - name: Run smoke tests
        run: |
          pytest tests/ -m smoke -v \
            --alluredir=allure-results \
            --junitxml=test-results/smoke.xml \
            --timeout=300
        env:
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
      
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: allure-report-smoke
          path: allure-results
      
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/*.xml
          check_name: Smoke Tests

  # =========================================================================
  # API Tests
  # =========================================================================
  
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
      
      - name: Run API tests
        run: |
          pytest tests/ -m api -v \
            --alluredir=allure-results \
            --junitxml=test-results/api.xml \
            --timeout=300
        env:
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
      
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: allure-report-api
          path: allure-results

  # =========================================================================
  # Regression Tests
  # =========================================================================
  
  regression-tests:
    name: Regression Tests (Parallel)
    runs-on: ubuntu-latest
    needs: [smoke-tests, api-tests]
    strategy:
      matrix:
        partition: [1, 2, 3, 4]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
      
      - name: Install Playwright browsers
        run: playwright install
      
      - name: Run regression tests (partition ${{ matrix.partition }}/4)
        run: |
          pytest tests/ -m regression -v \
            --alluredir=allure-results \
            --junitxml=test-results/regression-${{ matrix.partition }}.xml \
            -n 4 --dist loadscope \
            --timeout=600
        env:
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
      
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: allure-report-regression-${{ matrix.partition }}
          path: allure-results

  # =========================================================================
  # Report Generation
  # =========================================================================
  
  report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [smoke-tests, api-tests, regression-tests]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3
      
      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 10
      
      - name: Deploy report
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./report
      
      - name: Comment PR with report link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📊 [Test Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)'
            })

  # =========================================================================
  # Notifications
  # =========================================================================
  
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [unit-tests, smoke-tests, api-tests, regression-tests]
    if: always()
    
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Partner App QA - ${{ job.status }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Partner App QA Automation"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status*\n${{ job.status }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit*\n${{ github.sha }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
